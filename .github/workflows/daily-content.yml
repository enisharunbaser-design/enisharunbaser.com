name: Gunluk Icerik Guncelle

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Icerik uret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-content.js
      - name: Commit ve push
        run: |
          git config user.name "content-bot"
          git config user.email "bot@enisharunbaser.com"
          git add content.json
          git diff --staged --quiet || git commit -m "chore: icerik guncellendi $(date +%Y-%m-%d)"
          git push
