name: Günlük İçerik Güncelle

on:
  schedule:
    # Her gün sabah 06:00 UTC = 09:00 Türkiye saati
    - cron: '0 6 * * *'
  # Manuel tetikleme (Actions sekmesinden elle çalıştırabilirsin)
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: İçerik üret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-content.js

      - name: Değişiklikleri commit et ve push et
        run: |
          git config user.name "content-bot"
          git config user.email "bot@enisharunbaser.com"
          git add content.json
          git diff --staged --quiet || git commit -m "chore: günlük içerik güncellendi $(date +%Y-%m-%d)"
          git push
