<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>enisharunbaser.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --fg: #d8d8d8;
      --dim: #4a4a4a;
      --accent: #7fff7f;
      --border: #1e1e1e;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', monospace;
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
      line-height: 1.75;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .site-title {
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .blink {
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .site-desc {
      color: var(--dim);
      font-size: 0.8rem;
      margin-top: 0.35rem;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    section { margin-bottom: 3rem; }

    /* ── VİTRİN ── */
    .update-time {
      font-size: 0.68rem;
      color: var(--dim);
      margin-bottom: 1rem;
    }

    .vitrin-grid { display: grid; gap: 0.75rem; }

    .vitrin-card {
      border: 1px solid var(--border);
      padding: 1rem 1.2rem;
      transition: border-color 0.2s;
      cursor: default;
    }
    .vitrin-card:hover { border-color: #333; }

    .vitrin-card .tag {
      font-size: 0.6rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .vitrin-card h3 {
      font-size: 0.88rem;
      font-weight: normal;
      margin-bottom: 0.35rem;
    }

    .vitrin-card p {
      font-size: 0.78rem;
      color: var(--dim);
      line-height: 1.55;
    }

    .vitrin-card a {
      color: #333;
      text-decoration: none;
      font-size: 0.72rem;
      display: inline-block;
      margin-top: 0.5rem;
      transition: color 0.2s;
    }
    .vitrin-card a:hover { color: var(--accent); }

    /* ── ARAÇ ── */
    .tool-box {
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .api-setup {
      background: #0d0d0d;
      border: 1px solid var(--border);
      padding: 1.1rem;
      margin-bottom: 1.2rem;
      font-size: 0.78rem;
    }
    .api-setup p { color: var(--dim); margin-bottom: 0.7rem; }
    .api-setup a { color: var(--accent); }
    .key-row { display: flex; gap: 0.5rem; }

    .tool-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    input[type="text"] {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 0.55rem 0.8rem;
      font-family: inherit;
      font-size: 0.82rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #333; }
    input[type="text"]::placeholder { color: var(--dim); }

    button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.55rem 1.4rem;
      font-family: inherit;
      font-size: 0.82rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }
    button:hover { background: var(--accent); color: var(--bg); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button:disabled:hover { background: transparent; color: var(--accent); }

    .tool-result {
      margin-top: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--dim);
      min-height: 3.5rem;
      white-space: pre-wrap;
      line-height: 1.6;
      transition: color 0.3s;
    }
    .tool-result.active { color: var(--fg); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      font-size: 0.68rem;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 480px) {
      .tool-inputs { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 0.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-title">enisharunbaser.com <span class="blink">_</span></div>
  <div class="site-desc">// otomatik bir web köşesi. her gün güncellenir.</div>
</header>

<!-- VİTRİN -->
<section id="vitrin">
  <div class="section-label">vitrin</div>
  <div class="update-time" id="update-time"></div>
  <div class="vitrin-grid" id="vitrin-grid">
    <div class="vitrin-card">
      <div class="tag">yükleniyor</div>
      <p>içerik yükleniyor...</p>
    </div>
  </div>
</section>

<!-- ARAÇ -->
<section id="arac">
  <div class="section-label">araç: iki kavram, bir bağlantı</div>

  <div class="tool-box">
    <!-- API Key kurulumu -->
    <div id="api-setup-section" class="api-setup" style="display:none">
      <p>Bu araç Gemini API kullanıyor. Ücretsiz key için:
        <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>
      </p>
      <div class="key-row">
        <input type="text" id="api-key-input" placeholder="API key gir..." />
        <button onclick="saveApiKey()">kaydet</button>
      </div>
    </div>

    <!-- Araç -->
    <div id="tool-main">
      <div class="tool-inputs">
        <input type="text" id="word1" placeholder="birinci kavram..." />
        <input type="text" id="word2" placeholder="ikinci kavram..." />
      </div>
      <button id="connect-btn" onclick="findConnection()">bağlantı bul →</button>
      <div class="tool-result" id="tool-result">// iki kavram gir, aralarındaki beklenmedik bağlantıyı keşfet</div>
    </div>
  </div>
</section>

<footer>
  <span>enisharunbaser.com</span>
  <span id="footer-date"></span>
</footer>

<script>
// ═══════════════════════════════
//  VİTRİN
// ═══════════════════════════════
async function loadVitrin() {
  try {
    const res = await fetch('content.json?t=' + Date.now());
    const data = await res.json();

    const timeEl = document.getElementById('update-time');
    timeEl.textContent = data.updated
      ? '// son güncelleme: ' + data.updated
      : '';

    const grid = document.getElementById('vitrin-grid');

    if (!data.items || data.items.length === 0) {
      grid.innerHTML = '<div class="vitrin-card"><p>İçerik henüz hazırlanmadı. Yarın tekrar bak.</p></div>';
      return;
    }

    grid.innerHTML = data.items.map(item => `
      <div class="vitrin-card">
        <div class="tag">${escHtml(item.kategori || 'not')}</div>
        <h3>${escHtml(item.baslik)}</h3>
        <p>${escHtml(item.ozet)}</p>
        ${item.url ? `<a href="${escHtml(item.url)}" target="_blank" rel="noopener">kaynak →</a>` : ''}
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('vitrin-grid').innerHTML =
      '<div class="vitrin-card"><p>İçerik bulunamadı.</p></div>';
  }
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════
//  API KEY
// ═══════════════════════════════
function getApiKey() { return localStorage.getItem('gemini_key'); }

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_key', key);
  document.getElementById('api-setup-section').style.display = 'none';
  document.getElementById('tool-main').style.opacity = '1';
}

function checkApiKey() {
  if (!getApiKey()) {
    document.getElementById('api-setup-section').style.display = 'block';
    document.getElementById('tool-main').style.opacity = '0.45';
  }
}

// ═══════════════════════════════
//  BAĞLANTI BULUCU
// ═══════════════════════════════
async function findConnection() {
  const w1 = document.getElementById('word1').value.trim();
  const w2 = document.getElementById('word2').value.trim();
  const key = getApiKey();

  if (!key) { document.getElementById('api-setup-section').style.display = 'block'; return; }
  if (!w1 || !w2) { setResult('// iki kavram gir'); return; }

  const btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'düşünüyor...';
  setResult('...');

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `"${w1}" ve "${w2}" arasındaki beklenmedik ama gerçek bağlantıyı bul.
Yaratıcı, özgün ve kısa yaz (2-4 cümle). Akademik değil, meraklı ve samimi bir dil kullan.
Türkçe olsun. Klişe benzetmelerden kaçın.`
            }]
          }],
          generationConfig: { maxOutputTokens: 350, temperature: 0.92 }
        })
      }
    );

    const data = await res.json();
    if (data.error) {
      setResult('// hata: ' + data.error.message);
    } else {
      const text = data.candidates[0].content.parts[0].text;
      setResult(text, true);
    }
  } catch (e) {
    setResult('// bağlanamadı. API key\'i kontrol et.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'bağlantı bul →';
  }
}

function setResult(text, active = false) {
  const el = document.getElementById('tool-result');
  el.textContent = text;
  el.className = 'tool-result' + (active ? ' active' : '');
}

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  ['word1', 'word2'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') findConnection();
    });
  });

  document.getElementById('footer-date').textContent =
    new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });

  loadVitrin();
  checkApiKey();
});
</script>

</body>
</html>
